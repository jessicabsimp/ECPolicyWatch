name: Weekly data refresh

on:
  schedule:
    - cron: "0 14 * * 1"   # Every Monday at 9 AM ET
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  refresh:
    name: Fetch fresh ECE legislation from Open States
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run refresh script
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python3 scripts/refresh_data.py

      - name: Commit updated data if changed
        run: |
          git config user.name  "ecpolicywatch-bot"
          git config user.email "bot@ecpolicywatch.org"
          git diff --quiet bills.json bills-detail.json meta.json || (
            DATE=$(date +%Y-%m-%d)
            git add bills.json bills-detail.json meta.json
            git commit -m "Automated data refresh — ${DATE} [skip ci]"
            git push
          )
