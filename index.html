<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECPolicyWatch — Updates coming soon</title>
<meta name="description" content="ECPolicyWatch is being refreshed. Updates coming soon.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --color-fg: #f0f2f5;
  --color-bg: #0e1117;
  --color-surface: #161b22;
  --color-border: #2d3748;
  --color-accent: #6366f1;
  --color-accent-light: #818cf8;
  --color-text: #e2e8f0;
  --color-text-dim: #94a3b8;
  --color-text-muted: #64748b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(99, 102, 241, 0.12), transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 100%, rgba(129, 140, 248, 0.06), transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.brand {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 56px;
  position: relative;
  z-index: 1;
}
.brand-text {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 1.35rem;
  color: var(--color-fg);
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.brand-text span {
  display: block;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--color-text-dim);
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.6px;
  margin-top: 2px;
}
.content {
  max-width: 620px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.eyebrow {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--color-accent-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 14px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.25);
  border-radius: 999px;
  margin-bottom: 28px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: clamp(2.25rem, 6vw, 3.75rem);
  line-height: 1.1;
  color: var(--color-fg);
  margin-bottom: 24px;
  letter-spacing: -0.02em;
}
h1 .em-dash {
  color: var(--color-accent);
}
.subtitle {
  font-size: 1.05rem;
  color: var(--color-text-dim);
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.65;
}
footer {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.78rem;
  color: var(--color-text-muted);
  z-index: 1;
}
@media (max-width: 540px) {
  .brand { margin-bottom: 40px; }
  .brand-text { font-size: 1.15rem; }
  .eyebrow { margin-bottom: 20px; }
  h1 { margin-bottom: 18px; }
  .subtitle { font-size: 0.98rem; }
}
</style>
</head>
<body>

<div class="brand">
  <svg width="44" height="44" viewBox="0 0 40 40" fill="none" aria-hidden="true">
    <rect width="40" height="40" rx="10" fill="#6366f1"/>
    <text x="8" y="27" font-family="Playfair Display,serif" font-weight="800" font-size="22" fill="#fff">E</text>
  </svg>
  <div class="brand-text">
    ECE Policy Watch
    <span>Legislation Tracker</span>
  </div>
</div>

<main class="content">
  <span class="eyebrow">In progress</span>
  <h1>ECPolicyWatch <span class="em-dash">—</span> Updates coming soon</h1>
  <p class="subtitle">We're refreshing the tracker. Check back shortly for updated Tennessee and federal early childhood legislation coverage.</p>
</main>

<footer>
  &copy; <script>document.write(new Date().getFullYear())</script> ECE Policy Watch
</footer>

</body>
</html>
